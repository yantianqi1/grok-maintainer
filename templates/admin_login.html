<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>上游 Key 控制台登录</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='admin_base.css') }}">
  </head>
  <body class="admin-shell admin-login-body">
    <main class="login-card">
      <p class="eyebrow">deAPI Relay Admin</p>
      <h1>管理员登录</h1>
      <p class="hero-copy">进入上游 Key 控制台，统一管理启用状态、调用结果和错误轨迹。</p>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="flash-stack">
            {% for category, message in messages %}
              <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      <form method="post" action="{{ url_for('admin.login_submit') }}" class="login-form">
        <label class="field-label" for="username">账号</label>
        <input id="username" name="username" class="text-input" value="{{ username }}" autocomplete="username">
        <label class="field-label" for="password">密码</label>
        <input id="password" name="password" type="password" class="text-input" autocomplete="current-password">
        <button type="submit" class="primary-button">登录控制台</button>
      </form>
    </main>
  </body>
</html>
